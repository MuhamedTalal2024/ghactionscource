name: Artifact Demo

on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest

    steps:
      - name: Save my name
        run: echo "Muhamed Talal" > name.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-name
          path: name.txt

  job_2:
    runs-on: ubuntu-latest
    needs: job_1

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-name

      - name: Display file
        run: cat name.txt
